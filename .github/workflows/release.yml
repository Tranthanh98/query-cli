name: Release

# Compiles a standalone binary per platform with `bun build --compile`, uploads
# each binary as a GitHub Release asset, then publishes the thin `query-cli`
# launcher package that downloads the correct binary on first run.
#
# Trigger by pushing a tag like `v0.1.0`, or run manually via the Actions tab.
# Uses npm Trusted Publishing (OIDC) — no long-lived NPM_TOKEN required.
# You must configure a Trusted Publisher on npmjs.com for the `query-cli` package
# before first publish.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (no leading v), e.g. 0.1.0"
        required: true

permissions:
  contents: write # upload release assets
  id-token: write # npm Trusted Publishing (OIDC)

jobs:
  build:
    name: ${{ matrix.pkg }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            target: bun-linux-x64
            pkg: linux-x64
            os: linux
            cpu: x64
            ext: ""
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            pkg: linux-arm64
            os: linux
            cpu: arm64
            ext: ""
          # macOS Intel (x64) disabled — macos-13 runners are often queued for hours.
          # Re-enable if/when GitHub provides faster x64 macOS runners or demand increases.
          # - runner: macos-13
          #   target: bun-darwin-x64
          #   pkg: darwin-x64
          #   os: darwin
          #   cpu: x64
          #   ext: ""
          - runner: macos-14
            target: bun-darwin-arm64
            pkg: darwin-arm64
            os: darwin
            cpu: arm64
            ext: ""
          - runner: windows-latest
            target: bun-windows-x64
            pkg: win32-x64
            os: win32
            cpu: x64
            ext: ".exe"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building query-cli-${{ matrix.pkg }}@$VERSION"

      # Installs deps for THIS runner's platform, so the matching OpenTUI native
      # Zig library gets pulled in and embedded by --compile. This is why we build
      # each target on its own runner instead of cross-compiling from one machine.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile standalone binary
        run: |
          bun build --compile --target=${{ matrix.target }} \
            src/index.tsx --outfile "query-cli${{ matrix.ext }}"

      - name: Rename binary for release
        run: mv "query-cli${{ matrix.ext }}" "query-cli-${{ matrix.pkg }}${{ matrix.ext }}"

      - name: Create GitHub Release (if not exists)
        run: |
          gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}

      - name: Upload binary to GitHub Release
        run: |
          gh release upload "v${VERSION}" "query-cli-${{ matrix.pkg }}${{ matrix.ext }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}

  publish:
    name: query-cli (main)
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Assemble main package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist/query-cli/bin
          cp bin/query-cli.mjs dist/query-cli/bin/query-cli.mjs
          [ -f README.md ] && cp README.md dist/query-cli/ || true
          cat > dist/query-cli/package.json <<EOF
          {
            "name": "query-cli",
            "version": "$VERSION",
            "description": "Terminal database client",
            "type": "module",
            "repository": { "type": "git", "url": "git+https://github.com/Tranthanh98/query-cli.git" },
            "bin": { "query-cli": "bin/query-cli.mjs" },
            "files": ["bin"]
          }
          EOF

      - name: Debug npm auth
        run: |
          npm config list
          npm whoami 2>/dev/null || echo "npm whoami failed (expected if no classic token)"
          cat .npmrc 2>/dev/null || echo "No .npmrc in repo root"

      - name: Publish main package
        run: npm publish --access public --provenance
        working-directory: dist/query-cli
